<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Librero - Notas al Margen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #0a0a0a;
            font-family: 'Courier New', Courier, monospace;
            color: #ccc;
            padding: 2rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .contenedor {
            max-width: 1100px;
            width: 100%;
        }
        .cabecera {
            text-align: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid #2a2a2a;
            padding-bottom: 1rem;
        }
        .cabecera h1 {
            font-size: 1.8rem;
            letter-spacing: 6px;
            font-weight: normal;
            text-transform: lowercase;
            color: #aaa;
        }
        .cabecera p {
            font-size: 0.8rem;
            color: #666;
            margin-top: 0.5rem;
        }
        .imagen-librero {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border: 1px solid #2a2a2a;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            margin-bottom: 2rem;
            filter: grayscale(0.2) sepia(0.1);
        }
        .botones {
            display: flex;
            gap: 2rem;
            justify-content: center;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
        }
        .btn-librero {
            background: transparent;
            border: 1px solid #3a3a3a;
            color: #ddd;
            padding: 0.8rem 2rem;
            font-family: inherit;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-librero:hover {
            border-color: #aaa;
            color: white;
            box-shadow: 0 0 12px rgba(255,255,255,0.05);
        }
        .panel {
            background: #0c0c0c;
            border: 1px solid #2a2a2a;
            padding: 1.8rem;
            margin-top: 1rem;
            box-shadow: 0 5px 20px rgba(0,0,0,0.4);
        }
        .panel h2 {
            font-size: 1.2rem;
            letter-spacing: 3px;
            margin-bottom: 1.2rem;
            color: #b0b0b0;
            text-transform: lowercase;
            font-weight: normal;
            border-left: 3px solid #444;
            padding-left: 12px;
        }
        textarea {
            width: 100%;
            background: #010101;
            border: 1px solid #333;
            padding: 1rem;
            color: #e0e0e0;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            resize: vertical;
            margin-bottom: 1rem;
        }
        .btn-submit {
            background: transparent;
            border: 1px solid #3a6a3a;
            color: #8c8;
            padding: 0.5rem 1.2rem;
            cursor: pointer;
            font-family: inherit;
            transition: 0.2s;
        }
        .btn-submit:hover {
            background: #1a2a1a;
            border-color: #6a9a6a;
            color: #cfc;
        }
        .lista-aportes {
            max-height: 400px;
            overflow-y: auto;
            padding-right: 5px;
        }
        .aporte {
            background: #050505;
            border-left: 3px solid #3a3a3a;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        .aporte .meta {
            font-size: 0.7rem;
            color: #777;
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px dotted #2a2a2a;
            padding-bottom: 5px;
        }
        .aporte .seudonimo {
            color: #b9b97a;
            font-weight: bold;
        }
        .aporte .contenido {
            font-size: 0.9rem;
            line-height: 1.5;
            white-space: pre-wrap;
        }
        .vacio {
            text-align: center;
            color: #555;
            padding: 2rem;
            font-style: italic;
        }
        .logout {
            text-align: right;
            margin-top: 2rem;
        }
        .logout button {
            background: transparent;
            border: 1px solid #444;
            color: #888;
            padding: 0.3rem 0.8rem;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.7rem;
        }
        footer {
            margin-top: 3rem;
            font-size: 0.7rem;
            text-align: center;
            color: #444;
        }
        /* Botón música flotante */
        .btn-musica {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            background: #111;
            border: 1px solid #333;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 2000;
            transition: all 0.3s;
            color: #aaa;
        }
        .btn-musica:hover {
            border-color: #aaa;
            color: white;
            transform: scale(1.05);
        }
        .btn-musica.activo {
            color: #8c8;
            border-color: #6a9a6a;
            box-shadow: 0 0 8px rgba(100,150,100,0.3);
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ========== CONFIGURACIÓN SUPABASE ==========
        // REEMPLAZA con tus credenciales reales de Supabase
        const SUPABASE_URL = 'https://ifuxbjkkagfxnilkliez.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_Xw04CdFYfbNowhYyKuYA7Q_50cohsWB';  // ← Cámbialo por tu anon key

        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    </script>
</head>
<body>
<div class="contenedor">
    <div class="cabecera">
        <h1>el librero de los márgenes</h1>
        <p id="saludo">donde habitan las palabras olvidadas</p>
    </div>
    <img class="imagen-librero" src="https://cdn.pixabay.com/photo/2017/08/06/21/48/books-2596809_1280.jpg" 
         alt="Librero antiguo" onerror="this.src='https://picsum.photos/id/20/1100/400'">
    <div class="botones">
        <button class="btn-librero" id="btnEscribir">📝 panel de escritura</button>
        <button class="btn-librero" id="btnLeer">📖 leer aportes</button>
    </div>
    <div id="panelDinamico" class="panel">
        <h2>▸ elige una opción</h2>
        <p style="color:#555; text-align:center;">Selecciona "panel de escritura" o "leer aportes".</p>
    </div>
    <div class="logout">
        <button id="btnLogout">🚪 cerrar sesión</button>
    </div>
    <footer>notas al margen — cada palabra es un eco</footer>
</div>

<!-- Música de fondo -->
<audio id="musicaFondo" loop preload="auto">
    <source src="https://cdn.pixabay.com/download/audio/2022/03/10/audio_c8c8f7b6c6.mp3?filename=ambient-piano-10740.mp3" type="audio/mpeg">
</audio>
<div id="btnMusica" class="btn-musica" title="Música">🎵</div>

<script>
    // ========== VARIABLES GLOBALES ==========
    let currentUser = null;
    let currentPseudonym = '';

    // ========== VERIFICAR SESIÓN ==========
    async function checkSession() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (!session) {
            window.location.href = 'index.html';
            return;
        }
        currentUser = session.user;
        // Obtener seudónimo del perfil
        const { data: profile, error } = await supabaseClient
            .from('profiles')
            .select('pseudonym')
            .eq('id', currentUser.id)
            .single();
        if (profile) {
            currentPseudonym = profile.pseudonym;
            document.getElementById('saludo').innerHTML = `donde habitan las palabras olvidadas — ✦ ${escapeHtml(currentPseudonym)}`;
        } else {
            currentPseudonym = currentUser.email.split('@')[0];
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ========== FUNCIONES DE POSTS ==========
    async function publicarPost(contenido) {
        if (!contenido.trim()) return false;
        const { error } = await supabaseClient
            .from('posts')
            .insert([{
                user_id: currentUser.id,
                content: contenido.trim(),
                pseudonym: currentPseudonym
            }]);
        if (error) {
            console.error('Error al publicar:', error);
            return false;
        }
        return true;
    }

    async function obtenerPosts() {
        const { data, error } = await supabaseClient
            .from('posts')
            .select('*')
            .order('created_at', { ascending: false });
        if (error) {
            console.error('Error al obtener posts:', error);
            return [];
        }
        return data;
    }

    // ========== MOSTRAR PANELES ==========
    function mostrarEscritura() {
        const panel = document.getElementById('panelDinamico');
        panel.innerHTML = `
            <h2>▸ escribe en el margen</h2>
            <textarea id="textoNota" rows="5" placeholder="¿qué pensamientos agonizan en tu librero interno?"></textarea>
            <button class="btn-submit" id="btnPublicar">publicar nota</button>
            <div id="msgEscritura" style="margin-top:12px; font-size:0.75rem;"></div>
        `;
        document.getElementById('btnPublicar').addEventListener('click', async () => {
            const texto = document.getElementById('textoNota').value;
            const msgDiv = document.getElementById('msgEscritura');
            if (!texto.trim()) {
                msgDiv.innerHTML = '❌ el texto no puede estar vacío.';
                return;
            }
            const ok = await publicarPost(texto);
            if (ok) {
                msgDiv.innerHTML = '✅ nota publicada en el librero.';
                document.getElementById('textoNota').value = '';
                setTimeout(() => msgDiv.innerHTML = '', 3000);
            } else {
                msgDiv.innerHTML = '⚠️ error al guardar. Revisa tu conexión o las políticas RLS.';
            }
        });
    }

    async function mostrarLectura() {
        const panel = document.getElementById('panelDinamico');
        panel.innerHTML = `<h2>▸ voces susurradas al margen</h2><div id="listaContainer">Cargando...</div>`;
        const posts = await obtenerPosts();
        const container = document.getElementById('listaContainer');
        if (posts.length === 0) {
            container.innerHTML = '<div class="vacio">📭 aún no hay notas. sé el primero en escribir.</div>';
            return;
        }
        let html = '<div class="lista-aportes">';
        posts.forEach(post => {
            html += `
                <div class="aporte">
                    <div class="meta">
                        <span class="seudonimo">✒️ ${escapeHtml(post.pseudonym)}</span>
                        <span>📅 ${new Date(post.created_at).toLocaleString()}</span>
                    </div>
                    <div class="contenido">${escapeHtml(post.content)}</div>
                </div>
            `;
        });
        html += '</div>';
        container.innerHTML = html;
    }

    // ========== CERRAR SESIÓN ==========
    async function logout() {
        await supabaseClient.auth.signOut();
        window.location.href = 'index.html';
    }

    // ========== MÚSICA ==========
    const audio = document.getElementById('musicaFondo');
    const btnMusica = document.getElementById('btnMusica');

    function toggleMusica() {
        if (audio.paused) {
            audio.play().catch(e => console.log("Error al reproducir:", e));
            btnMusica.classList.add('activo');
            localStorage.setItem('musicaActiva', 'true');
        } else {
            audio.pause();
            btnMusica.classList.remove('activo');
            localStorage.setItem('musicaActiva', 'false');
        }
    }

    btnMusica.addEventListener('click', toggleMusica);

    // Restaurar estado visual desde localStorage
    if (localStorage.getItem('musicaActiva') === 'true') {
        btnMusica.classList.add('activo');
        // No reproducimos automáticamente, pero el usuario puede hacer clic.
    }

    // ========== INICIALIZACIÓN ==========
    window.addEventListener('DOMContentLoaded', async () => {
        await checkSession();
        document.getElementById('btnEscribir').addEventListener('click', mostrarEscritura);
        document.getElementById('btnLeer').addEventListener('click', mostrarLectura);
        document.getElementById('btnLogout').addEventListener('click', logout);
    });
</script>
</body>
</html>
